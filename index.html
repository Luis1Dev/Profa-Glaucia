<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CrossFit · Presença com Firebase</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }

        .card {
            max-width: 600px;
            width: 100%;
            background: #0f0f1a;
            border-radius: 48px;
            padding: 28px 22px 38px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 100, 0, 0.2);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .icon-crossfit {
            font-size: 48px;
            background: linear-gradient(135deg, #ff6600, #ff3300);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #ffaa66);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 6px;
        }

        .subtitulo {
            color: #ff884d;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(255, 102, 0, 0.15);
            display: inline-block;
            padding: 5px 16px;
            border-radius: 60px;
            margin-top: 8px;
        }

        .status-cloud {
            background: #1a3a2a;
            border-radius: 20px;
            padding: 8px 16px;
            margin: 15px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 12px;
            color: #4caf50;
        }

        .status-cloud.offline {
            background: #3a1a1a;
            color: #ff8888;
        }

        .aula-info {
            background: #1a1a2a;
            border-radius: 24px;
            padding: 14px 18px;
            margin: 18px 0;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            border-left: 4px solid #ff6600;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #ccc;
            font-size: 13px;
        }

        .lista-titulo {
            display: flex;
            justify-content: space-between;
            margin: 18px 0 12px;
        }

        .lista-titulo h3 {
            color: #ffaa77;
            font-size: 17px;
        }

        .contador {
            background: #ff6600;
            color: #0f0f1a;
            padding: 4px 12px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 14px;
        }

        .aluno-item {
            background: #14141f;
            margin: 8px 0;
            padding: 12px 16px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
            border: 1px solid #252535;
            cursor: pointer;
        }

        .aluno-item:hover {
            background: #1c1c2c;
            transform: translateX(4px);
        }

        .aluno-nome {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            color: #e0e0e0;
        }

        .checkbox-custom {
            width: 26px;
            height: 26px;
            background: #25253a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .aluno-item.presente .checkbox-custom {
            background: #ff6600;
            box-shadow: 0 0 8px #ff6600;
        }

        .aluno-item.presente .checkbox-custom::after {
            content: "✓";
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        .aluno-item.presente .aluno-nome {
            text-decoration: line-through;
            color: #ffaa77;
        }

        .botoes-acao {
            display: flex;
            gap: 12px;
            margin: 20px 0 16px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            background: #25253a;
            border: none;
            padding: 12px 8px;
            border-radius: 60px;
            color: #ddd;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            background: #353550;
            transform: translateY(-2px);
        }

        .btn-primary {
            background: #ff6600;
            color: #0f0f1a;
        }

        .btn-primary:hover {
            background: #ff8833;
        }

        .add-aluno {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .add-aluno input {
            flex: 1;
            background: #1a1a2a;
            border: 1px solid #333350;
            padding: 12px 16px;
            border-radius: 60px;
            color: white;
            font-family: inherit;
            outline: none;
        }

        .add-aluno input:focus {
            border-color: #ff6600;
        }

        .btn-pequeno {
            background: #ff6600;
            border: none;
            border-radius: 60px;
            padding: 0 22px;
            font-weight: bold;
            font-size: 20px;
            cursor: pointer;
        }

        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff6600;
            color: #0f0f1a;
            font-weight: bold;
            padding: 10px 22px;
            border-radius: 60px;
            z-index: 1000;
            animation: toastAnim 2s forwards;
            font-size: 13px;
        }

        @keyframes toastAnim {
            0% { opacity: 0; bottom: 10px; }
            20% { opacity: 1; bottom: 30px; }
            80% { opacity: 1; bottom: 30px; }
            100% { opacity: 0; bottom: 10px; visibility: hidden; }
        }

        .footer {
            text-align: center;
            font-size: 10px;
            color: #555;
            margin-top: 18px;
        }

        .loading {
            text-align: center;
            color: #ffaa77;
            padding: 20px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <div class="icon-crossfit">🏋️‍♂️</div>
        <h1>PRESENÇA · CROSSWOD</h1>
        <div class="subtitulo">COM FIREBASE ☁️</div>
    </div>

    <div id="statusCloud" class="status-cloud">
        🔄 Conectando ao Firebase...
    </div>

    <div class="aula-info">
        <div class="info-item">📅 <span id="dataAtual"></span></div>
        <div class="info-item">⏱️ WOD </div>
        <div class="info-item">👨‍🏫 Josias</div>
        <div class="info-item">🆔 <span id="turmaId">carregando...</span></div>
    </div>

    <div class="lista-titulo">
        <h3>🔘 CONFIRMAR PRESENÇA</h3>
        <span class="contador" id="contadorPresentes">0/0</span>
    </div>

    <div id="listaAlunos">
        <div class="loading">⏳ Carregando dados do servidor...</div>
    </div>

    <div class="botoes-acao">
        <button class="btn btn-primary" id="btnConfirmarTodos">✅ CONFIRMAR TODOS</button>
        <button class="btn" id="btnResetarPresencas">🔄 LIMPAR PRESENÇAS</button>
        <button class="btn" id="btnNovaTurma">🆕 NOVA TURMA</button>
    </div>

    <div class="add-aluno">
        <input type="text" id="novoAlunoNome" placeholder="Novo aluno... ex: Marcos Silva">
        <button class="btn-pequeno" id="btnAdicionar">+</button>
    </div>

    <div class="footer">
        ☁️ Dados salvos automaticamente na nuvem | Disponível em qualquer dispositivo
    </div>
</div>

<script>
    // 🔥 SUBSTITUA PELAS SUAS CREDENCIAIS DO FIREBASE 🔥
    const firebaseConfig = {
  apiKey: "AIzaSyDPH62ti3w1w1cxATm2eFwkMJQxM1fRnLk",
  authDomain: "crosswod-9d73c.firebaseapp.com",
  projectId: "crosswod-9d73c",
  storageBucket: "crosswod-9d73c.firebasestorage.app",
  messagingSenderId: "859805759552",
  appId: "1:859805759552:web:799f17f58c4c7d411687a5"
};

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Variáveis globais
    let alunos = [];
    let turmaAtual = null;
    let dataAtualStr = "";

    // Funções auxiliares
    function showToast(msg) {
        let toast = document.querySelector('.toast-msg');
        if(toast) toast.remove();
        toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function atualizarStatusCloud(conectado) {
        const statusDiv = document.getElementById('statusCloud');
        if(conectado) {
            statusDiv.className = 'status-cloud';
            statusDiv.innerHTML = '☁️ Conectado ao Firebase · Dados salvos em tempo real';
        } else {
            statusDiv.className = 'status-cloud offline';
            statusDiv.innerHTML = '⚠️ Offline · Tentando reconectar...';
        }
    }

    function atualizarContador() {
        const presentes = alunos.filter(a => a.presente).length;
        const total = alunos.length;
        document.getElementById('contadorPresentes').innerText = `${presentes}/${total}`;
    }

    function renderizarLista() {
        const container = document.getElementById('listaAlunos');
        if(alunos.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#666; padding:20px;">Nenhum aluno ainda. Adicione um! 👆</div>';
            return;
        }
        container.innerHTML = '';
        alunos.forEach((aluno, index) => {
            const div = document.createElement('div');
            div.className = `aluno-item ${aluno.presente ? 'presente' : ''}`;
            div.setAttribute('data-index', index);
            div.innerHTML = `
                <div class="aluno-nome">
                    <span class="avatar-emoticon">${aluno.emoji || '💪'}</span>
                    ${aluno.nome}
                </div>
                <div class="checkbox-custom"></div>
            `;
            div.addEventListener('click', () => togglePresenca(index));
            container.appendChild(div);
        });
        atualizarContador();
    }

    async function togglePresenca(index) {
        alunos[index].presente = !alunos[index].presente;
        renderizarLista();
        await salvarNoFirebase();
        const status = alunos[index].presente ? 'presente' : 'ausente';
        showToast(`${alunos[index].nome} → ${status}`);
    }

    async function confirmarTodos() {
        alunos.forEach(a => a.presente = true);
        renderizarLista();
        await salvarNoFirebase();
        showToast('🏆 TODOS CONFIRMADOS! 💪');
    }

    async function resetarPresencas() {
        alunos.forEach(a => a.presente = false);
        renderizarLista();
        await salvarNoFirebase();
        showToast('🔄 Presenças reiniciadas');
    }

    async function adicionarAluno() {
        const input = document.getElementById('novoAlunoNome');
        let nome = input.value.trim();
        if(nome === "") {
            showToast("Digite o nome do aluno!");
            return;
        }
        const emojis = ['💪','🏋️‍♂️','⚡','🔥','🏆','🥇','🤸‍♀️','🦍','🚴','🥊','💯','🎯'];
        const randEmoji = emojis[Math.floor(Math.random() * emojis.length)];
        alunos.push({ nome: nome, emoji: randEmoji, presente: false });
        input.value = '';
        renderizarLista();
        await salvarNoFirebase();
        showToast(`➕ ${nome} adicionado!`);
    }

    async function novaTurma() {
        if(confirm('🆕 Criar nova turma? A turma atual será mantida no histórico.')) {
            turmaAtual = `${new Date().toISOString().slice(0,16)}_${Date.now()}`;
            document.getElementById('turmaId').innerText = turmaAtual.slice(-10);
            alunos = [];
            carregarAlunosPadrao();
            renderizarLista();
            await salvarNoFirebase();
            showToast('✨ Nova turma criada! IDs anteriores permanecem no banco');
        }
    }

    function carregarAlunosPadrao() {
        if(alunos.length === 0) {
            alunos = [
                { nome: "Bruno Mendes", emoji: "💪", presente: false },
                { nome: "Carla Souza", emoji: "🏋️‍♀️", presente: false },
                { nome: "Daniel Lima", emoji: "🔥", presente: false },
                { nome: "Fernanda Rocha", emoji: "⚡", presente: false },
                { nome: "Guilherme Nunes", emoji: "🏆", presente: false },
                { nome: "Juliana Peixoto", emoji: "💥", presente: false }
            ];
        }
    }

    // SALVAR no Firebase
    async function salvarNoFirebase() {
        if(!turmaAtual) return;
        try {
            await database.ref(`presencas/${turmaAtual}/alunos`).set(alunos);
            await database.ref(`presencas/${turmaAtual}/ultimaAtualizacao`).set(new Date().toISOString());
            atualizarStatusCloud(true);
        } catch(error) {
            console.error("Erro ao salvar:", error);
            atualizarStatusCloud(false);
            showToast("❌ Erro ao salvar no servidor!");
        }
    }

    // CARREGAR do Firebase
    async function carregarDoFirebase() {
        // Recupera a última turma usada
        const ultimaTurmaSalva = localStorage.getItem('ultimaTurmaCrossFit');
        
        if(ultimaTurmaSalva) {
            turmaAtual = ultimaTurmaSalva;
            document.getElementById('turmaId').innerText = turmaAtual.slice(-10);
            try {
                const snapshot = await database.ref(`presencas/${turmaAtual}/alunos`).once('value');
                const dados = snapshot.val();
                if(dados && Array.isArray(dados)) {
                    alunos = dados;
                    renderizarLista();
                    atualizarStatusCloud(true);
                    showToast('📥 Dados carregados da nuvem!');
                } else {
                    carregarAlunosPadrao();
                    renderizarLista();
                    await salvarNoFirebase();
                }
            } catch(error) {
                carregarAlunosPadrao();
                renderizarLista();
                atualizarStatusCloud(false);
            }
        } else {
            // Criar nova turma
            turmaAtual = `${new Date().toISOString().slice(0,16)}_${Date.now()}`;
            document.getElementById('turmaId').innerText = turmaAtual.slice(-10);
            localStorage.setItem('ultimaTurmaCrossFit', turmaAtual);
            carregarAlunosPadrao();
            renderizarLista();
            await salvarNoFirebase();
        }
    }

    // Data atual
    function setDataAtual() {
        const hoje = new Date();
        dataAtualStr = hoje.toLocaleDateString('pt-BR') + ' - ' + hoje.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
        document.getElementById('dataAtual').innerText = dataAtualStr;
    }

    // Configurar monitor de conexão
    function setupConnectionMonitor() {
        const connectedRef = database.ref('.info/connected');
        connectedRef.on('value', (snap) => {
            if(snap.val() === true) {
                atualizarStatusCloud(true);
            } else {
                atualizarStatusCloud(false);
            }
        });
    }

    // Event listeners
    document.getElementById('btnConfirmarTodos').addEventListener('click', confirmarTodos);
    document.getElementById('btnResetarPresencas').addEventListener('click', resetarPresencas);
    document.getElementById('btnNovaTurma').addEventListener('click', novaTurma);
    document.getElementById('btnAdicionar').addEventListener('click', adicionarAluno);
    document.getElementById('novoAlunoNome').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') adicionarAluno();
    });

    // Inicialização
    setDataAtual();
    setupConnectionMonitor();
    carregarDoFirebase();
</script>
</body>
</html>
